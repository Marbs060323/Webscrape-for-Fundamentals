function formatNum(n) {
  return parseFloat(n).toLocaleString('en-US', {maximumFractionDigits:2});
}

function render() {
  const totalGB = daily.reduce((s,r) => s + r.total_gb, 0);
  const avgGB = totalGB / daily.length;
  const maxDay = daily.reduce((a,b) => a.total_gb > b.total_gb ? a : b);

  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><h3>Total Usage</h3><div class="value">${formatNum(totalGB)}</div><div class="unit">GB</div></div>
    <div class="card"><h3>Daily Average</h3><div class="value">${formatNum(avgGB)}</div><div class="unit">GB / day</div></div>
    <div class="card"><h3>Highest Day</h3><div class="value">${formatNum(maxDay.total_gb)}</div><div class="unit">GB on ${maxDay.date}</div></div>
    <div class="card"><h3>Days Tracked</h3><div class="value">${daily.length}</div><div class="unit">days</div></div>
  `;

  const maxMonthly = Math.max(...monthly.map(r => r.total_usage_gb));
  document.querySelector('#monthly-table tbody').innerHTML = monthly.map(r => {
    const avg = r.total_usage_gb / r.days;
    return `<tr>
      <td>${r.month}</td>
      <td>${formatNum(r.total_download_gb)}</td>
      <td>${formatNum(r.total_upload_gb)}</td>
      <td><strong>${formatNum(r.total_usage_gb)}</strong></td>
      <td>${r.days}</td>
      <td>${formatNum(avg)}</td>
    </tr>`;
  }).join('');

  const maxDaily = Math.max(...daily.map(r => r.total_gb));
  document.querySelector('#daily-table tbody').innerHTML = daily.map(r => {
    const pct = (r.total_gb / maxDaily) * 100;
    return `<tr>
      <td>${r.date}</td>
      <td>${formatNum(r.download_gb)}</td>
      <td>${formatNum(r.upload_gb)}</td>
      <td><strong>${formatNum(r.total_gb)}</strong></td>
      <td><div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('');
}

render();
